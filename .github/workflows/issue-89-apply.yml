name: Apply issue 89 patch

on:
  push:
    branches:
      - step-89-preset-display-live
    paths:
      - .github/workflows/issue-89-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: step-89-preset-display-live
          fetch-depth: 0
      - run: python .github/scripts/apply_issue_89.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: refactor: route selected preset application through builder
          branch: step-89-preset-display-live
          file_pattern: ViewModels/MainWindowViewModel.cs
