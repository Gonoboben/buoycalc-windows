name: Apply issue 85 patch
on:
  push:
    branches: [issue-85-current-profile-summary]
    paths: [.github/workflows/issue-85-apply.yml]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: issue-85-current-profile-summary
      - run: python .github/scripts/apply_issue_85.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: refactor: route current profile summary through builder
          branch: issue-85-current-profile-summary
          file_pattern: ViewModels/MainWindowViewModel.cs
# trigger after workflow registration
