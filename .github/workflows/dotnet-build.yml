name: .NET Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  build:
    name: Build BuoyCalc Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore and build with commit status
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $statusUrl = "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}"
          $targetUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          function Set-BuoyCalcStatus([string]$state, [string]$description) {
            $body = @{
              state = $state
              context = "BuoyCalc Windows Build"
              description = $description
              target_url = $targetUrl
            } | ConvertTo-Json

            Invoke-RestMethod -Uri $statusUrl -Method Post -Headers $headers -ContentType "application/json" -Body $body | Out-Null
          }

          Set-BuoyCalcStatus "pending" "Build started"

          try {
            dotnet restore BuoyCalc.Windows.csproj
            if ($LASTEXITCODE -ne 0) {
              throw "dotnet restore failed with exit code $LASTEXITCODE"
            }

            dotnet build BuoyCalc.Windows.csproj --configuration Release --no-restore
            if ($LASTEXITCODE -ne 0) {
              throw "dotnet build failed with exit code $LASTEXITCODE"
            }

            pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-reportbuilder-usage.ps1
            if ($LASTEXITCODE -ne 0) {
              throw "ReportBuilder usage check failed with exit code $LASTEXITCODE"
            }

            pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-technical-report-path.ps1
            if ($LASTEXITCODE -ne 0) {
              throw "Technical report path smoke check failed with exit code $LASTEXITCODE"
            }

            pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-readmodel-boundary.ps1
            if ($LASTEXITCODE -ne 0) {
              throw "Read-model boundary smoke check failed with exit code $LASTEXITCODE"
            }

            pwsh -NoProfile -ExecutionPolicy Bypass -File tools/scan-report-store-consumers.ps1
            if ($LASTEXITCODE -ne 0) {
              throw "Report store consumer scan failed with exit code $LASTEXITCODE"
            }

            pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-report-store-consumer-map.ps1
            if ($LASTEXITCODE -ne 0) {
              throw "Report store consumer map check failed with exit code $LASTEXITCODE"
            }

            pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-selected-shape-consumer-map.ps1
            if ($LASTEXITCODE -ne 0) {
              throw "Selected shape consumer map check failed with exit code $LASTEXITCODE"
            }

            pwsh -NoProfile -ExecutionPolicy Bypass -File tools/check-pdf-diagram-source-order.ps1
            if ($LASTEXITCODE -ne 0) {
              throw "PDF diagram source order smoke check failed with exit code $LASTEXITCODE"
            }

            Set-BuoyCalcStatus "success" "Build succeeded"
          }
          catch {
            Set-BuoyCalcStatus "failure" "Build failed"
            throw
          }
