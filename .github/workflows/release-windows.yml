name: BuoyCalc Windows Release

on:
  workflow_dispatch:

jobs:
  publish-windows:
    name: Publish Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BuoyCalc.Windows.csproj

      - name: Publish win-x64 self-contained
        shell: pwsh
        run: ./scripts/publish-windows.ps1 -Runtime win-x64 -Configuration Release -Output artifacts/publish/BuoyCalc-Windows-win-x64

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: BuoyCalc-Windows-win-x64
          path: artifacts/publish/BuoyCalc-Windows-win-x64
          if-no-files-found: error
