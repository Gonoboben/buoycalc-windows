name: Issue 81 Apply Patch

on:
  push:
    branches:
      - issue-81-default-template-production
    paths:
      - .github/workflows/issue-81-apply.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: issue-81-default-template-production
          fetch-depth: 0

      - name: Apply guarded patch
        run: python .github/scripts/apply_issue_81.py

      - name: Commit production change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ViewModels/MainWindowViewModel.cs
          git diff --cached --check
          git commit -m "refactor: apply immutable default project template"
          git push origin HEAD:issue-81-default-template-production
